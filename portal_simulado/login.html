<!doctype html>
<html lang="pt-br">
<head><meta charset="utf-8"><title>Portal do Simulado</title><link rel="stylesheet" href="assets/style.css"></head>
<body>
<div class="shell">
  <div class="card" style="max-width: 460px; margin: 80px auto;">
    <h1>Portal do Simulado</h1>
    <p class="muted">Colégio Caminhos do Futuro - ambiente fictício local.</p>
    <label>Email</label>
    <input id="email" value="">
    <label>Senha</label>
    <input id="senha" type="password" value="">
    <button onclick="entrar()">Entrar</button>
    <p class="muted">Acesso de demonstração: coordenacao@colegiocaminhosfuturo.local / Demo@2026</p>
  </div>
</div>
<script>
function entrar() {
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value.trim();
  if (email === 'coordenacao@colegiocaminhosfuturo.local' && senha === 'Demo@2026') {
    window.location.href = 'painel.html';
  } else {
    alert('Email ou senha inválidos no ambiente fictício.');
  }
}
</script>
</body>
</html>
